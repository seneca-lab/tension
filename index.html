<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tensión">
<meta name="theme-color" content="#f3f0e7">
<title>Registro de tensión</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #f3f0e7;
    --ink: #20251f;
    --ink-soft: #5a5f54;
    --line: #d9d3c4;
    --paper: #fbf9f3;
    --accent: #38513f;
    --accent-soft: #e3ebe2;
    --warn: #9a4a2f;
    --warn-soft: #f1e2da;
    --shadow: rgba(32, 37, 31, 0.10);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 16px;
    line-height: 1.45;
  }

  body {
    background-image:
      radial-gradient(circle at 18% 12%, rgba(56,81,63,0.05), transparent 42%),
      radial-gradient(circle at 88% 88%, rgba(154,74,47,0.045), transparent 45%);
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .wrap {
    max-width: 460px;
    margin: 0 auto;
    padding: 22px 18px 60px;
  }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 22px;
  }
  header.top h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 27px;
    line-height: 1.05;
    margin: 0;
    letter-spacing: -0.01em;
  }
  header.top h1 span { display: block; font-size: 15px; color: var(--accent); font-weight: 600; font-family: 'Hanken Grotesk', sans-serif; letter-spacing: 0.02em; margin-top: 3px; }
  .counter {
    text-align: right;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.3;
  }
  .counter b { font-size: 22px; color: var(--ink); display: block; font-weight: 600; }

  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 1px 0 var(--shadow);
    margin-bottom: 18px;
  }

  .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--ink-soft); font-weight: 600; margin-bottom: 9px; }

  .moments { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .moments button {
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 4px;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .moments button.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  .vitals { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .vital { text-align: center; }
  .vital .label { text-align: center; }
  .vital input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    padding: 14px 4px;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 30px;
    font-weight: 500;
    text-align: center;
    color: var(--ink);
    -moz-appearance: textfield;
  }
  .vital input::-webkit-outer-spin-button,
  .vital input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .vital input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .vital .unit { font-size: 11px; color: var(--ink-soft); margin-top: 5px; }

  .when { display: flex; gap: 10px; margin-bottom: 16px; }
  .when > div { flex: 1; }
  .when input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: #fff;
    padding: 11px;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 15px;
    color: var(--ink);
  }
  .when input:focus { outline: none; border-color: var(--accent); }

  .save {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 13px;
    background: var(--accent);
    color: #fff;
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }
  .save:active { transform: scale(0.985); }

  .flash {
    text-align: center;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
    height: 18px;
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .flash.show { opacity: 1; }

  h2.sec { font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; margin: 30px 0 14px; }

  .day { margin-bottom: 18px; }
  .day-head { display: flex; justify-content: space-between; align-items: baseline; padding: 0 4px 7px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
  .day-head .date { font-weight: 700; font-size: 15px; }
  .day-head .avg { font-family: 'Spline Sans Mono', monospace; font-size: 13px; color: var(--accent); font-weight: 600; }

  .reading {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 9px 4px;
  }
  .reading + .reading { border-top: 1px dashed var(--line); }
  .reading .mom { font-size: 12px; font-weight: 600; color: var(--ink-soft); width: 58px; }
  .reading .vals { font-family: 'Spline Sans Mono', monospace; font-size: 17px; font-weight: 500; }
  .reading .vals small { font-size: 12px; color: var(--ink-soft); font-weight: 400; }
  .reading .meta { font-family: 'Spline Sans Mono', monospace; font-size: 12px; color: var(--ink-soft); text-align: right; }
  .reading .del {
    border: none; background: transparent; color: var(--warn);
    font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1; opacity: 0.55;
  }
  .reading .del:hover { opacity: 1; }
  .reading .row-main { display: flex; flex-direction: column; }

  .empty { text-align: center; color: var(--ink-soft); padding: 26px 0; font-size: 14px; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 22px; }
  .actions button {
    padding: 13px;
    border: 1px solid var(--accent);
    border-radius: 12px;
    background: transparent;
    color: var(--accent);
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .actions button:active { background: var(--accent-soft); }
  .danger {
    width: 100%;
    margin-top: 10px;
    padding: 11px;
    border: 1px solid var(--warn-soft);
    border-radius: 12px;
    background: transparent;
    color: var(--warn);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .danger:active { background: var(--warn-soft); }

  .hint { font-size: 12.5px; color: var(--ink-soft); text-align: center; margin-top: 18px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Registro<span>de tensión</span></h1>
    <div class="counter"><b id="todayCount">0</b>tomas hoy</div>
  </header>

  <div class="card">
    <div class="label">Momento del día</div>
    <div class="moments" id="moments">
      <button data-m="Mañana" class="on">Mañana</button>
      <button data-m="Noche">Noche</button>
      <button data-m="Otro">Otro</button>
    </div>

    <div class="vitals">
      <div class="vital">
        <div class="label">Alta</div>
        <input id="sys" type="number" inputmode="numeric" placeholder="120">
        <div class="unit">sistólica</div>
      </div>
      <div class="vital">
        <div class="label">Baja</div>
        <input id="dia" type="number" inputmode="numeric" placeholder="80">
        <div class="unit">diastólica</div>
      </div>
      <div class="vital">
        <div class="label">Pulso</div>
        <input id="pul" type="number" inputmode="numeric" placeholder="70">
        <div class="unit">lpm</div>
      </div>
    </div>

    <div class="when">
      <div>
        <div class="label">Fecha</div>
        <input id="date" type="date">
      </div>
      <div>
        <div class="label">Hora</div>
        <input id="time" type="time">
      </div>
    </div>

    <button class="save" id="saveBtn">Guardar toma</button>
    <div class="flash" id="flash">Guardado</div>
  </div>

  <h2 class="sec">Historial</h2>
  <div id="history"></div>

  <div class="actions">
    <button id="csvBtn">Exportar CSV</button>
    <button id="copyBtn">Copiar tabla</button>
  </div>
  <button class="danger" id="clearBtn">Borrar todos los registros</button>

  <p class="hint">Los datos se guardan en este navegador. Exporta el CSV cada cierto tiempo para no perderlos si cambias de móvil o limpias el navegador.</p>
</div>

<script>
const KEY = 'bp-readings-v1';
let readings = [];
let momento = 'Mañana';

const $ = id => document.getElementById(id);
const sysEl = $('sys'), diaEl = $('dia'), pulEl = $('pul');
const dateEl = $('date'), timeEl = $('time');

function pad(n){ return String(n).padStart(2,'0'); }
function nowDefaults(){
  const d = new Date();
  dateEl.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  timeEl.value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function load(){
  try {
    const raw = localStorage.getItem(KEY);
    readings = raw ? JSON.parse(raw) : [];
  } catch(e) {
    readings = [];
  }
  render();
}

function persist(){
  try { localStorage.setItem(KEY, JSON.stringify(readings)); }
  catch(e) { alert('No se ha podido guardar en este navegador. Exporta el CSV para no perder los datos.'); }
}

$('moments').addEventListener('click', e => {
  const b = e.target.closest('button');
  if(!b) return;
  document.querySelectorAll('#moments button').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  momento = b.dataset.m;
});

$('saveBtn').addEventListener('click', save);

function save(){
  const sys = parseInt(sysEl.value, 10);
  const dia = parseInt(diaEl.value, 10);
  const pulRaw = pulEl.value === '' ? null : parseInt(pulEl.value, 10);
  if(!sys || !dia){
    flash('Falta la alta o la baja', true);
    return;
  }
  readings.push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2,6),
    fecha: dateEl.value,
    hora: timeEl.value,
    momento,
    sys, dia,
    pul: (pulRaw == null || isNaN(pulRaw)) ? null : pulRaw
  });
  persist();
  sysEl.value = ''; diaEl.value = ''; pulEl.value = '';
  nowDefaults();
  render();
  flash('Guardado');
  sysEl.focus();
}

function flash(msg, warn){
  const f = $('flash');
  f.textContent = msg;
  f.style.color = warn ? 'var(--warn)' : 'var(--accent)';
  f.classList.add('show');
  setTimeout(()=> f.classList.remove('show'), 1600);
}

function del(id){
  readings = readings.filter(r => r.id !== id);
  persist();
  render();
}

function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d,10)} ${meses[parseInt(m,10)-1]} ${y}`;
}

function avg(arr, k){
  const v = arr.map(r => r[k]).filter(x => x != null);
  if(!v.length) return null;
  return Math.round(v.reduce((a,b)=>a+b,0)/v.length);
}

function render(){
  const today = dateEl.value || (()=>{ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; })();
  $('todayCount').textContent = readings.filter(r => r.fecha === today).length;

  const host = $('history');
  if(!readings.length){
    host.innerHTML = '<div class="empty">Todavía no hay tomas registradas.</div>';
    return;
  }

  const byDate = {};
  readings.forEach(r => { (byDate[r.fecha] = byDate[r.fecha] || []).push(r); });
  const dates = Object.keys(byDate).sort().reverse();

  host.innerHTML = dates.map(date => {
    const items = byDate[date].slice().sort((a,b)=> (a.hora||'').localeCompare(b.hora||''));
    const aS = avg(items,'sys'), aD = avg(items,'dia');
    const avgTxt = (aS && aD) ? `media ${aS}/${aD}` : '';
    const rows = items.map(r => `
      <div class="reading">
        <div class="mom">${r.momento}</div>
        <div class="row-main">
          <div class="vals">${r.sys}/${r.dia}${r.pul!=null?` <small>· ${r.pul} lpm</small>`:''}</div>
          <div class="meta">${r.hora||''}</div>
        </div>
        <button class="del" data-id="${r.id}" aria-label="Eliminar">×</button>
      </div>`).join('');
    return `<div class="day">
      <div class="day-head"><span class="date">${fmtDate(date)}</span><span class="avg">${avgTxt}</span></div>
      ${rows}
    </div>`;
  }).join('');

  host.querySelectorAll('.del').forEach(b => b.addEventListener('click', () => del(b.dataset.id)));
}

function toCSV(){
  const head = ['Fecha','Hora','Momento','Sistolica','Diastolica','Pulso'];
  const rows = readings.slice().sort((a,b)=> (a.fecha+a.hora).localeCompare(b.fecha+b.hora))
    .map(r => [r.fecha, r.hora||'', r.momento, r.sys, r.dia, r.pul!=null?r.pul:''].join(','));
  return head.join(',') + '\n' + rows.join('\n');
}

$('csvBtn').addEventListener('click', () => {
  if(!readings.length){ flash('No hay datos', true); return; }
  const blob = new Blob(['\ufeff' + toCSV()], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'tension.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  flash('CSV descargado');
});

$('copyBtn').addEventListener('click', async () => {
  if(!readings.length){ flash('No hay datos', true); return; }
  const tsv = toCSV().split('\n').map(l => l.split(',').join('\t')).join('\n');
  try {
    await navigator.clipboard.writeText(tsv);
    flash('Tabla copiada');
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = tsv; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); flash('Tabla copiada'); }
    catch(_) { flash('No se pudo copiar', true); }
    document.body.removeChild(ta);
  }
});

$('clearBtn').addEventListener('click', () => {
  if(!readings.length) return;
  if(confirm('¿Borrar todos los registros? Esta acción no se puede deshacer.')){
    readings = [];
    persist();
    render();
    flash('Registros borrados');
  }
});

nowDefaults();
load();
</script>
</body>
</html>
